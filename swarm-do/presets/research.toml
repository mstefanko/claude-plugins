name = "research"
description = "Output-only research pipeline that produces an evidence memo without writer branches or a PR."
pipeline = "research"
origin = "stock"

[routing]
"roles.agent-research" = { backend = "claude", model = "claude-sonnet-4-6", effort = "high" }
"roles.agent-research-merge" = { backend = "claude", model = "claude-opus-4-7", effort = "high" }

[budget]
max_agents_per_run = 20
max_estimated_cost_usd = 8.0
max_wall_clock_seconds = 7200

[decompose]
mode = "off"

[mem_prime]
mode = "off"
max_tokens = 500
recency_days = 90
min_relevance = 0.6
adapter = "dispatch_file"
