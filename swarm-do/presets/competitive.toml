name = "competitive"
description = "Opt-in alternative-generation lab with two writers and a cross-family judge; not a production default."
pipeline = "compete"
origin = "stock"

[routing]
"roles.agent-analysis" = { backend = "claude", model = "claude-opus-4-7", effort = "xhigh" }
"roles.agent-writer-judge" = { backend = "codex", model = "gpt-5.4", effort = "high" }

[budget]
max_agents_per_run = 120
max_estimated_cost_usd = 40.0
max_wall_clock_seconds = 21600
max_writer_tool_calls = 60
max_writer_output_bytes = 60000
max_handoffs = 1

[decompose]
mode = "off"

[mem_prime]
mode = "off"
max_tokens = 500
recency_days = 90
min_relevance = 0.6
adapter = "dispatch_file"
