name = "hybrid-review"
description = "High-confidence implementation profile that feeds provider evidence and fail-open Codex review into final review."
pipeline = "hybrid-review"
origin = "stock"

[review_providers]
selection = "auto"
min_success = 1
max_parallel = 4

[routing]
"roles.agent-codex-review" = { backend = "codex", model = "gpt-5.4", effort = "high" }

[budget]
max_agents_per_run = 100
max_estimated_cost_usd = 25.0
max_wall_clock_seconds = 14400
max_writer_tool_calls = 60
max_writer_output_bytes = 60000
max_handoffs = 1

[decompose]
mode = "off"

[mem_prime]
mode = "off"
max_tokens = 500
recency_days = 90
min_relevance = 0.6
adapter = "dispatch_file"
