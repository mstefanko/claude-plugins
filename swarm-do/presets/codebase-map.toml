name = "codebase-map"
description = "Output-only read-only localization profile using the codebase-map research lens."
pipeline = "codebase-map"
origin = "stock"

[routing]
"roles.agent-research" = { backend = "claude", model = "claude-sonnet-4-6", effort = "high" }

[budget]
max_agents_per_run = 5
max_estimated_cost_usd = 4.0
max_wall_clock_seconds = 3600

[decompose]
mode = "off"

[mem_prime]
mode = "off"
max_tokens = 500
recency_days = 90
min_relevance = 0.6
adapter = "dispatch_file"
