name = "brainstorm"
description = "Output-only ideation profile that produces a synthesis note without writer branches or a PR."
pipeline = "brainstorm"
origin = "stock"

[routing]
"roles.agent-brainstorm" = { backend = "claude", model = "claude-sonnet-4-6", effort = "high" }

[budget]
max_agents_per_run = 20
max_estimated_cost_usd = 8.0
max_wall_clock_seconds = 7200

[decompose]
mode = "off"

[mem_prime]
mode = "off"
max_tokens = 500
recency_days = 90
min_relevance = 0.6
adapter = "dispatch_file"
