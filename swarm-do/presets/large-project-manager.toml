name = "large-project-manager"
description = "Experimental large-phase profile using repair-loop plus decomposition inspect policy."
pipeline = "repair-loop"
origin = "experiment"

[review_providers]
selection = "auto"
min_success = 1
max_parallel = 4

[routing]
"roles.agent-docs" = { backend = "codex", model = "gpt-5.4-mini", effort = "medium" }
"roles.agent-spec-review" = { backend = "codex", model = "gpt-5.4-mini", effort = "medium" }
"roles.agent-clarify" = { backend = "codex", model = "gpt-5.4-mini", effort = "medium" }
"roles.agent-writer.simple" = { backend = "codex", model = "gpt-5.4-mini", effort = "medium" }
"roles.agent-clean-review" = { backend = "codex", model = "gpt-5.4", effort = "high" }

[budget]
max_agents_per_run = 160
max_estimated_cost_usd = 45.0
max_wall_clock_seconds = 28800
max_writer_tool_calls = 60
max_writer_output_bytes = 60000
max_handoffs = 2

[decompose]
mode = "inspect"

[mem_prime]
mode = "hard_only"
max_tokens = 1200
recency_days = 90
min_relevance = 0.6
adapter = "dispatch_file"
