name = "mco-review-lab"
description = "Opt-in experimental pipeline that feeds read-only MCO Claude review evidence into the normal Claude review lane."
pipeline = "mco-review-lab"
origin = "experiment"

[budget]
max_agents_per_run = 200
max_estimated_cost_usd = 50.0
max_wall_clock_seconds = 50000
max_writer_tool_calls = 60
max_writer_output_bytes = 60000
max_handoffs = 1

[decompose]
mode = "off"

[mem_prime]
mode = "off"
max_tokens = 500
recency_days = 90
min_relevance = 0.6
adapter = "dispatch_file"
