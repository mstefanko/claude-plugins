name = "smart-friend"
description = "Experimental advisor-stage implementation profile; preserves one mutating writer."
pipeline = "smart-friend"
origin = "experiment"

[review_providers]
selection = "auto"
min_success = 1
max_parallel = 4

[routing]
smart-advisor = { backend = "claude", model = "claude-opus-4-7", effort = "high" }
"roles.agent-docs" = { backend = "codex", model = "gpt-5.4-mini", effort = "medium" }
"roles.agent-spec-review" = { backend = "codex", model = "gpt-5.4-mini", effort = "medium" }
"roles.agent-clarify" = { backend = "codex", model = "gpt-5.4-mini", effort = "medium" }
"roles.agent-writer.simple" = { backend = "codex", model = "gpt-5.4-mini", effort = "medium" }

[budget]
max_agents_per_run = 100
max_estimated_cost_usd = 25.0
max_wall_clock_seconds = 18000
max_writer_tool_calls = 60
max_writer_output_bytes = 60000
max_handoffs = 1

[decompose]
mode = "off"

[mem_prime]
mode = "off"
max_tokens = 500
recency_days = 90
min_relevance = 0.6
adapter = "dispatch_file"
