pipeline_version: 1
name: research-orchestrator
description: V1 parity with research: static source-quality lenses and synthesis; future versions add explicit subquestion orchestration.
parallelism: 3
stages:
  - id: research
    fan_out:
      role: agent-research
      count: 3
      variant: prompt_variants
      variants: [codebase-map, prior-art-search, risk-discovery]
    merge:
      strategy: synthesize
      agent: agent-research-merge
    failure_tolerance:
      mode: quorum
      min_success: 2
