pipeline_version: 1
name: research-orchestrator
description: Output-only breadth-first research profile with static source-quality lenses and synthesis.
parallelism: 3
stages:
  - id: research
    fan_out:
      role: agent-research
      count: 3
      variant: prompt_variants
      variants: [codebase-map, prior-art-search, risk-discovery]
    merge:
      strategy: synthesize
      agent: agent-research-merge
    failure_tolerance:
      mode: quorum
      min_success: 2
