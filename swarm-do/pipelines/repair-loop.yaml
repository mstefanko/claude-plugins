pipeline_version: 1
name: repair-loop
description: Bounded evaluator-optimizer implementation flow with one clean-context review and revision cycle.
stages:
  - id: research
    agents:
      - role: agent-research
  - id: analysis
    depends_on: [research]
    agents:
      - role: agent-analysis
  - id: clarify
    depends_on: [research]
    agents:
      - role: agent-clarify
  - id: writer
    depends_on: [analysis, clarify]
    agents:
      - role: agent-writer
  - id: clean-review
    depends_on: [writer]
    agents:
      - role: agent-clean-review
  - id: revise-writer
    depends_on: [writer, clean-review]
    agents:
      - role: agent-writer
    failure_tolerance:
      mode: best-effort
  - id: spec-review
    depends_on: [revise-writer]
    agents:
      - role: agent-spec-review
  - id: provider-review
    depends_on: [revise-writer]
    provider:
      type: swarm-review
      command: review
      selection: auto
      output: findings
      memory: false
      timeout_seconds: 1800
      max_parallel: 4
    failure_tolerance:
      mode: best-effort
  - id: review
    depends_on: [spec-review, provider-review]
    agents:
      - role: agent-review
  - id: docs
    depends_on: [spec-review]
    agents:
      - role: agent-docs
