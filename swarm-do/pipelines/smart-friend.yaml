pipeline_version: 1
name: smart-friend
description: Experimental implementation profile with a read-only advisor stage before the single writer.
stages:
  - id: research
    agents:
      - role: agent-research
  - id: analysis
    depends_on: [research]
    agents:
      - role: agent-analysis
  - id: clarify
    depends_on: [research]
    agents:
      - role: agent-clarify
  - id: advisor
    depends_on: [analysis, clarify]
    agents:
      - role: agent-implementation-advisor
        route: smart-advisor
  - id: writer
    depends_on: [analysis, clarify, advisor]
    agents:
      - role: agent-writer
  - id: spec-review
    depends_on: [writer]
    agents:
      - role: agent-spec-review
  - id: provider-review
    depends_on: [writer]
    provider:
      type: swarm-review
      command: review
      selection: auto
      output: findings
      memory: false
      timeout_seconds: 1800
      max_parallel: 4
    failure_tolerance:
      mode: best-effort
  - id: review
    depends_on: [spec-review, provider-review]
    agents:
      - role: agent-review
  - id: docs
    depends_on: [spec-review]
    agents:
      - role: agent-docs
