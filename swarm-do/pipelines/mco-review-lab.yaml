pipeline_version: 1
name: mco-review-lab
description: Experimental read-only MCO review stage after writer and before Claude review.
stages:
  - id: research
    agents:
      - role: agent-research
  - id: analysis
    depends_on: [research]
    agents:
      - role: agent-analysis
  - id: clarify
    depends_on: [research]
    agents:
      - role: agent-clarify
  - id: writer
    depends_on: [analysis, clarify]
    agents:
      - role: agent-writer
  - id: spec-review
    depends_on: [writer]
    agents:
      - role: agent-spec-review
  - id: mco-review
    depends_on: [writer]
    provider:
      type: mco
      command: review
      providers: [claude]
      mode: review
      strict_contract: true
      output: findings
      memory: false
      timeout_seconds: 1800
    failure_tolerance:
      mode: best-effort
  - id: review
    depends_on: [spec-review, mco-review]
    agents:
      - role: agent-review
  - id: docs
    depends_on: [spec-review]
    agents:
      - role: agent-docs
