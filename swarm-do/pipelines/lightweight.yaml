pipeline_version: 1
name: lightweight
description: Small-change pipeline without spec-review and docs stages.
stages:
  - id: research
    agents:
      - role: agent-research
  - id: analysis
    depends_on: [research]
    agents:
      - role: agent-analysis
  - id: clarify
    depends_on: [research]
    agents:
      - role: agent-clarify
  - id: writer
    depends_on: [analysis, clarify]
    agents:
      - role: agent-writer
  - id: provider-review
    depends_on: [writer]
    provider:
      type: swarm-review
      command: review
      selection: auto
      output: findings
      memory: false
      timeout_seconds: 1800
      max_parallel: 4
    failure_tolerance:
      mode: best-effort
  - id: review
    depends_on: [writer, provider-review]
    agents:
      - role: agent-review
